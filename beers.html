<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rated Beers – Hall of Taps</title>
  <link rel="stylesheet" href="css/site.css">
</head>
<body>
  <nav class="main-nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">Hall of Taps</a>
      <ul class="nav-links">
        <li><a href="beers.html">Rated Beers</a></li>
        <li><a href="welcome.html">Welcome</a></li>
        <li><a href="math-primer.html">How we rate</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </div>
    <div class="nav-divider"></div>
  </nav>
  <div class="wrap beers-page">
    <h1 class="visually-hidden">Rated Beers</h1>
    <div class="filter-panel">
      <div class="filter-form">
        <div class="filter-row filter-row--horizontal">
          <div class="filter-group filter-group--equal">
            <label for="quick-search" class="filter-label">Quick Search</label>
            <input type="text" id="quick-search" class="filter-input" placeholder="Search beers and breweries by name" aria-label="Quick search beers and breweries">
          </div>
          <div class="filter-group filter-group--equal">
            <label for="filter-breweries" class="filter-label">Brewery</label>
            <input type="text" id="filter-breweries" list="brewery-datalist" class="filter-input" placeholder="All breweries or type to search" aria-label="Filter by brewery" autocomplete="off">
            <datalist id="brewery-datalist">
              <!-- Populated from data/breweries/names.json -->
            </datalist>
          </div>
          <div class="filter-group filter-group--equal">
            <label for="filter-styles" class="filter-label">Styles <span class="filter-label-hint">(20 max)</span></label>
            <input type="text" id="filter-styles" list="styles-datalist" class="filter-input" placeholder="All styles or type to search (e.g. IPA, Stout)" aria-label="Filter by styles" autocomplete="off">
            <datalist id="styles-datalist">
              <!-- Populated from data/beers/styles.json -->
            </datalist>
          </div>
        </div>
        <div class="filter-row filter-row--horizontal">
          <div class="filter-group">
            <label for="abv-min" class="filter-label">ABV</label>
            <div class="filter-range">
              <select id="abv-min" class="filter-select" aria-label="ABV minimum">
                <option value="">Min</option>
                <option value="0" selected>0.0</option>
                <option value="3">3.0</option>
                <option value="5">5.0</option>
                <option value="7">7.0</option>
                <option value="10">10.0</option>
                <option value="15">15.0</option>
                <option value="25">25.0</option>
              </select>
              <span class="filter-range-sep">–</span>
              <select id="abv-max" class="filter-select" aria-label="ABV maximum">
                <option value="">Max</option>
                <option value="0">0.0</option>
                <option value="3">3.0</option>
                <option value="5">5.0</option>
                <option value="7">7.0</option>
                <option value="10">10.0</option>
                <option value="15">15.0</option>
                <option value="25" selected>25.0</option>
              </select>
            </div>
          </div>
          <div class="filter-group">
            <label for="bar-min" class="filter-label">BAR</label>
            <div class="filter-range">
              <select id="bar-min" class="filter-select" aria-label="BAR minimum">
                <option value="">Min</option>
                <option value="-15" selected>-15.0</option>
                <option value="0">0.0</option>
                <option value="5">5.0</option>
                <option value="10">10.0</option>
                <option value="15">15.0</option>
                <option value="19">19.0</option>
              </select>
              <span class="filter-range-sep">–</span>
              <select id="bar-max" class="filter-select" aria-label="BAR maximum">
                <option value="" selected>Max</option>
                <option value="-15">-15.0</option>
                <option value="0">0.0</option>
                <option value="5">5.0</option>
                <option value="10">10.0</option>
                <option value="15">15.0</option>
                <option value="19">19.0</option>
                <option value="25">25.0</option>
                <option value="35">35.0</option>
                <option value="50">50.0</option>
              </select>
            </div>
          </div>
          <div class="filter-group filter-group--actions">
            <button type="button" class="btn btn--primary btn--nowrap" id="filter-apply" aria-label="Apply filters">
              <span class="btn-icon" aria-hidden="true">&#9660;</span> Filter Leaderboards
            </button>
            <button type="button" class="btn btn--secondary" id="filter-reset">Reset</button>
          </div>
        </div>
      </div>
    </div>
    <div class="table-wrap">
      <table class="beers-leaderboard-table">
        <thead>
          <tr>
            <th class="beers-col-num">#</th>
            <th>Beer</th>
            <th>Style</th>
            <th>Brewery</th>
            <th>Origin</th>
            <th class="beers-col-sort" data-sort="BeerAbv">ABV <span class="sort-indicator" aria-hidden="true"></span></th>
            <th class="beers-col-sort" data-sort="StylePlus">Style+ <span class="sort-indicator" aria-hidden="true"></span></th>
            <th class="beers-col-sort beers-col-bar" data-sort="HallRating">BAR <span class="sort-indicator" aria-hidden="true"></span><span class="col-filter-icon" aria-hidden="true">&#9776;</span></th>
          </tr>
        </thead>
        <tbody id="beers-table">
          <tr><td colspan="8" class="loading">Loading beers…</td></tr>
        </tbody>
      </table>
    </div>
    <div id="beers-pagination"></div>
  </div>
  <script src="js/site.js"></script>
  <script>
    if (window.HallOfTaps) HallOfTaps.loadBeers(document.getElementById('beers-table'), document.getElementById('beers-pagination'));
  </script>
</body>
</html>
