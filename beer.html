<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beer – Hall of Taps</title>
  <link rel="stylesheet" href="css/site.css">
</head>
<body>
  <nav class="main-nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">Hall of Taps</a>
      <ul class="nav-links">
        <li><a href="beers.html">Rated Beers</a></li>
        <li><a href="breweries.html">Breweries</a></li>
        <li><a href="welcome.html">Welcome</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <div class="nav-right">
        <form class="search-form" role="search" action="beers.html" method="get">
          <label for="search-input" class="visually-hidden">Search beers and content</label>
          <input type="search" id="search-input" name="q" placeholder="Search beers and content" aria-label="Search beers and content">
          <button type="submit" class="search-btn" aria-label="Search"><span aria-hidden="true">&#8981;</span></button>
        </form>
      </div>
    </div>
    <div class="nav-divider"></div>
  </nav>
  <div class="wrap beer-detail-wrap">
    <div id="beer-detail">
      <p class="loading">Loading beer…</p>
    </div>
  </div>
  <script src="js/site.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      var el = document.getElementById('beer-detail');
      if (id && window.HallOfTaps && window.HallOfTaps.loadBeerDetail) {
        window.HallOfTaps.loadBeerDetail(el, id);
      } else if (!id) {
        el.innerHTML = '<p class="error">No beer specified. <a href="beers.html">Browse beers</a>.</p>';
      } else {
        el.innerHTML = '<p class="error">Could not load beer.</p>';
      }
    })();
  </script>
</body>
</html>
